<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Magshop ERP v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="header-main">
        <div class="logo-group">
            <img src="Logo/Magshop-GRADIENT-transp-02-02.png" alt="Magshop logo" class="main-logo">
        </div>

        <nav class="nav-group">
            <button id="btn-tamio" class="btn-nav">💰 Ταμείο </button>
            <button id="btn-paraggelies" class="btn-nav">📦 Παραγγελίες</button>
        </nav>
    </header>

    <!--MAIN CONTENT-->
    <div class="main-wrapper">
        <!-- ΤΑΜΕΙΟ Section -->
            <section id="financeContent" class="app-section">

                <!-- SEARCH BAR  -->
                <div class="search-bar">
                    <input type="search" id="searchInput"   class="search-bar__input" placeholder="🔍     Αναζήτηση...">
                    <input type="date" id="dateFilter"  class="search-bar__date">
                    <button id="resetBtn" class="btn btn--outline   search-bar__btn" onclick="resetFilters()">Reset</button>
                </div>

            <!--STATS GRID -->
            <div class="stats-grid">
                <div class="stats-card stats-grid--income">
                    <h3>Έσοδα</h3>
                    <span class="stats-value" id="totalIncome">0.00€</span>
                </div>
                <div class="stats-card stats-grid--expense">
                    <h3>Έξοδα</h3>
                    <span class="stats-value" id="totalExpense">0.00€</span>
                </div>
                <div class="stats-card stats-grid--balance">
                    <h3>Υπόλοιπο</h3>
                    <span class="stats-value" id="netBalance">0.00€</span>
                </div>
            </div>

            <!-- FORM -->
            <form class="entry-form">
                <input id="entryDate" type="date" class="entry-form__date">
                <select id="entryType" class="entry-form__type">
                    <option>📈 Έσοδο</option>
                    <option>📉 Έξοδο</option>
                </select>
                <input id="product" type="text" class="entry-form__product" placeholder="Περιγραφή">
                <input id="customer" type="text" class="entry-form__customer" placeholder="Πελάτης">
                <input id="phone" type="text" class="entry-form__customer" placeholder="Τηλέφωνο">
                <input id="downpayment" type="number" class="entry-form__amount" placeholder="Προκαταβολή (€)">
                <input id="notes" type="text" class="entry-form__notes" placeholder="Σημειώσεις"></input>
                <select id="method" class="entry-form__type">
                    <option>💵 Μετρητά </option> 
                    <option>💳 Κάρτα </option> 
                    <option>🏦 Κατάθεση </option> 
                </select>
                <input id="amount" type="number" class="entry-form__amount" placeholder="Ποσό (€)">
                <button type="button" onclick="addEntry()" class="btn btn--success entry-form__btn">Προσθήκη</button>
            </form>

            <!-- TABS ΕΣΟΔΑ-ΕΞΟΔΑ -->
            <div class="tabs-container">
                <button id="tab-income" class="tab-btn active" onclick="switchTab('income')">📈 Προβολή Εσόδων</button>
                <button id="tab-expense" class="tab-btn" onclick="switchTab('expense')">📉 Προβολή Εξόδων</button>
            </div>

            <!-- TABLE -->
            <div class="table-container">
                <table id="financeTable">
                    <thead>
                        <tr id="tableHeaderRow">
                            <th>ΗΜΕΡΟΜΗΝΙΑ</th>
                            <th>ΤΥΠΟΣ</th>
                            <th>ΠΕΡΙΓΡΑΦΗ</th>
                            <th>ΠΕΛΑΤΗΣ</th>
                            <th id="phoneHeader">ΤΗΛΕΦΩΝΟ</th>
                            <th>ΣΗΜΕΙΩΣΕΙΣ</th>
                            <th>ΜΕΘΟΔΟΣ</th>
                            <th>ΠΟΣΟ</th>
                            <th>ΕΝΕΡΓΕΙΕΣ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
        <!-- ΠΑΡΑΓΓΕΛΙΕΣ Section -->
        <section id="section-paraggelies" class="app-section">
            <h2>📦 Παραγγελίες </h2>
        </section>
    </div>

     <script src="script.js"></script>
</body>
</html>
